<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Upload Excel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

    <header class="header">
        PDF Generator
    </header>

    <main class="container">
        <section class="app-card mx-auto">
            <div class="d-flex align-items-center justify-content-between gap-3 mb-4">
                <h2 class="h4 mb-0">Upload Excel File</h2>
                <a class="btn btn-outline-secondary btn-sm" href="/logout">Logout</a>
            </div>

            {% if errors %}
            <div class="alert alert-danger" role="alert">
                <ul class="mb-0 ps-3">
                    {% for error in errors %}
                    <li>{{ error }}</li>
                    {% endfor %}
                </ul>
            </div>
            {% endif %}

            <form action="/upload" method="post" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label" for="file">Excel file</label>
                    <input class="form-control" id="file" type="file" name="file" required>
                </div>
                <button class="btn btn-primary w-100" type="submit">Validate & Download</button>
            </form>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
