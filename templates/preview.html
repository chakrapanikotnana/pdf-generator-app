<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Preview</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

    <header class="header">
        Image Validation Preview
    </header>

    <main class="container">
        <section class="app-card app-card-wide mx-auto">
            <div class="d-flex align-items-center justify-content-between gap-3 mb-4">
                <h2 class="h4 mb-0">Validation Results</h2>
                <a class="btn btn-outline-secondary btn-sm" href="/upload">&larr; Back</a>
            </div>

            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th scope="col">Row</th>
                            <th scope="col">Drawing</th>
                            <th scope="col">Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for r in results %}
                        <tr>
                            <td>{{ r.row }}</td>
                            <td>{{ r.drawing }}</td>
                            <td>
                                {% if r.found %}
                                <span class="badge text-bg-success">&#10003; Found</span>
                                {% else %}
                                <span class="badge text-bg-danger">&#10007; Missing</span>
                                {% endif %}
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>

            {% if not has_missing %}
            <form action="/generate" method="post" class="mt-4">
                <button class="btn btn-primary w-100" type="submit">Generate PDFs</button>
            </form>
            {% else %}
            <div class="alert alert-danger mt-4 mb-0" role="alert">Fix missing images before proceeding.</div>
            {% endif %}
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
